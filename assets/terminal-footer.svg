<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 104" width="100%">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06161d"/>
      <stop offset="1" stop-color="#102027"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#12313a"/>
      <stop offset="1" stop-color="#1d2b37"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="840" height="104" rx="12" ry="12" fill="url(#panel)"/>
  <rect x="0" y="0" width="840" height="36" rx="12" ry="12" fill="url(#bar)"/>
  <rect x="0" y="22" width="840" height="14" fill="#1d2b37"/>

  <style>
    .pulse-red { animation: pulseRed 3.6s ease-in-out infinite; }
    .pulse-gold { animation: pulseGold 3.6s ease-in-out 0.35s infinite; }
    .pulse-cyan { animation: pulseCyan 3.6s ease-in-out 0.7s infinite; }
    .cursor { animation: blink 1.05s steps(1) infinite; }
    @keyframes pulseRed {
      0%, 100% { opacity: 0.45; }
      35% { opacity: 1; }
    }
    @keyframes pulseGold {
      0%, 100% { opacity: 0.45; }
      35% { opacity: 1; }
    }
    @keyframes pulseCyan {
      0%, 100% { opacity: 0.45; }
      35% { opacity: 1; }
    }
    @keyframes blink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }
  </style>

  <circle class="pulse-red" cx="22" cy="18" r="6" fill="#fb7185"/>
  <circle class="pulse-gold" cx="44" cy="18" r="6" fill="#f8e16c"/>
  <circle class="pulse-cyan" cx="66" cy="18" r="6" fill="#22d3ee"/>

  <text x="420" y="23" fill="#94a3b8" font-family="'Courier New', Courier, monospace" font-size="13" text-anchor="middle">shreshtha@github:~/profile</text>

  <text font-family="'Courier New', Courier, monospace" font-size="14">
    <tspan x="22" y="66" fill="#22d3ee">$ </tspan><tspan fill="#e2e8f0">status --today</tspan><tspan class="cursor" fill="#f8e16c">_</tspan>
    <tspan x="22" dy="22" fill="#94a3b8">&gt; </tspan><tspan fill="#e2e8f0">learning in public, building with care, shipping small improvements</tspan>
  </text>
</svg>
